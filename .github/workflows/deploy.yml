name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PC_SSH_HOST }}
          username: ${{ secrets.PC_SSH_USER }}
          key: ${{ secrets.PC_SSH_KEY }}
          script: |
            set -e

            # Pull latest code (force reset to handle rebased/squashed history)
            cd ~/servers/phoenix/repo
            git fetch origin main
            git reset --hard origin/main

            # Write env. The LIVE phoenix app runs from repo/docker-compose.prod.yml
            # (service: dashboard -> repo-dashboard-1, host network :3000 behind nginx;
            #  eval-worker -> repo-eval-worker-1), which reads repo/.env.
            # (.env is gitignored, so the reset above does not touch it.)
            echo '${{ secrets.APP_ENV }}' > .env

            # Build + recreate the LIVE containers. Previously this deployed the
            # servers/docker-compose.yml phoenix-dashboard/eval-worker, which were
            # idle duplicates not wired to nginx — so every deploy silently shipped
            # to a container nobody was serving. Those duplicates were removed.
            docker compose -f docker-compose.prod.yml build dashboard eval-worker
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps dashboard eval-worker

            # Health check (wait for startup + migration)
            sleep 20
            curl -sf http://localhost:3000/api/health || exit 1
            echo "Deploy successful"
