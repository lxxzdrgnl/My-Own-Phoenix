name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PC_SSH_HOST }}
          username: ${{ secrets.PC_SSH_USER }}
          key: ${{ secrets.PC_SSH_KEY }}
          script: |
            set -e

            # Write env file
            echo '${{ secrets.APP_ENV }}' > ~/servers/phoenix/.env

            # Pull latest code
            cd ~/servers/phoenix/repo
            git pull origin main

            # Rebuild phoenix-dashboard via main servers compose
            cd ~/servers
            docker compose build --no-cache phoenix-dashboard
            docker compose up -d --force-recreate --no-deps phoenix-dashboard

            # Restart eval-worker
            docker compose up -d --force-recreate --no-deps phoenix-eval-worker

            # Health check (wait for startup + migration)
            sleep 20
            curl -sf http://localhost:3100/api/health || exit 1
            echo "Deploy successful"
