name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PC_SSH_HOST }}
          username: ${{ secrets.PC_SSH_USER }}
          key: ${{ secrets.PC_SSH_KEY }}
          script: |
            set -e

            # Write env file
            echo '${{ secrets.APP_ENV }}' > ~/servers/phoenix/.env

            # Pull latest code (force reset to handle rebased/squashed history)
            cd ~/servers/phoenix/repo
            git fetch origin main
            git reset --hard origin/main

            # Clean up stale containers and rebuild
            cd ~/servers
            docker compose rm -f phoenix-dashboard 2>/dev/null || true
            docker compose build phoenix-dashboard
            docker compose up -d --force-recreate --no-deps phoenix-dashboard

            # Rebuild + restart eval-worker so worker.py / prompts.py updates
            # actually land in the running image. Previously this step only
            # recreated the container, leaving a stale image baked at first
            # provisioning and silently shipping outdated worker code.
            docker compose build phoenix-eval-worker
            docker compose up -d --force-recreate --no-deps phoenix-eval-worker

            # Health check (wait for startup + migration)
            sleep 20
            curl -sf http://localhost:3000/api/health || curl -sf http://localhost:3100/api/health || exit 1
            echo "Deploy successful"
