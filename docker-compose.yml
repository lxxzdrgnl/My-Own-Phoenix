services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: phoenix
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phoenix_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix"]
      interval: 5s
      timeout: 5s
      retries: 5

  phoenix:
    image: arizephoenix/phoenix:latest
    user: "1000:1000"
    ports:
      - "6006:6006"   # UI + API (remove in production — use internal network)
      - "4317:4317"   # OTLP gRPC (remove in production)
      - "4318:4318"   # OTLP HTTP (remove in production)
    volumes:
      - ~/.phoenix:/data
    environment:
      - PHOENIX_WORKING_DIR=/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6006/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      # Mount source for hot-reload in dev mode
      - .:/app
      # Prevent overwriting node_modules from container
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - PHOENIX_URL=http://localhost:6006
      - PHOENIX_COLLECTOR_ENDPOINT=http://localhost:6006
      - LANGGRAPH_API_URL=http://localhost:2024
      - DATABASE_URL=postgresql://phoenix:${POSTGRES_PASSWORD:-phoenix_dev}@localhost:5432/phoenix
      - WATCHPACK_POLLING=true
    depends_on:
      phoenix:
        condition: service_healthy
      postgres:
        condition: service_healthy

  eval-worker:
    build:
      context: ./eval-worker
      dockerfile: Dockerfile
    network_mode: host
    env_file:
      - .env
    environment:
      - PHOENIX_URL=http://localhost:6006
      - DASHBOARD_URL=http://localhost:3000
      - EVAL_POLL_INTERVAL=15
    depends_on:
      phoenix:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

