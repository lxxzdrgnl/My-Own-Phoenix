services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: phoenix
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phoenix_dev}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix"]
      interval: 5s
      timeout: 5s
      retries: 5

  phoenix:
    image: arizephoenix/phoenix:latest
    user: "1000:1000"
    ports:
      - "6006:6006"   # UI + API (remove in production — use internal network)
      - "4317:4317"   # OTLP gRPC (remove in production)
      - "4318:4318"   # OTLP HTTP (remove in production)
    volumes:
      - ~/.phoenix:/data
    environment:
      - PHOENIX_WORKING_DIR=/data
      - PHOENIX_SQL_DATABASE_URL=postgresql://phoenix:${POSTGRES_PASSWORD:-phoenix_dev}@postgres:5432/phoenix_traces
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6006/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_LANGGRAPH_ASSISTANT_ID=${NEXT_PUBLIC_LANGGRAPH_ASSISTANT_ID:-agent}
    network_mode: host
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PHOENIX_URL=http://localhost:6006
      - PHOENIX_COLLECTOR_ENDPOINT=http://localhost:6006
      - LANGGRAPH_API_URL=http://localhost:2024
      - WATCHPACK_POLLING=true
    depends_on:
      phoenix:
        condition: service_healthy
      postgres:
        condition: service_healthy

  eval-worker:
    build:
      context: ./eval-worker
      dockerfile: Dockerfile
    network_mode: host
    env_file:
      - .env
    environment:
      - PHOENIX_URL=http://localhost:6006
      - DASHBOARD_URL=http://localhost:3000
      - EVAL_POLL_INTERVAL=15
    depends_on:
      phoenix:
        condition: service_healthy
    restart: unless-stopped


